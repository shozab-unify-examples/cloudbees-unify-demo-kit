apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: finsure-bank-regulated-release

# Regulated, governed release demo for FinSure Bank.
# Fully self-contained: every step is mock/echo, so it runs green in any
# CloudBees Unify org with no clusters, secrets, or integrations required.
# Story: governance review -> staging -> validation -> approval -> production -> evidence.

on:
  workflow_dispatch:
    inputs:
      change_ticket:
        type: string
        default: CHG-10482
      release_window:
        type: string
        default: Saturday 22:00-23:00 ET

jobs:
  governance-review:
    steps:
      - name: Validate audit evidence
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== FinSure Bank governance review =="
          echo "Release:        FinSure Bank Mobile Banking Release"
          echo "Change ticket:  ${{ inputs.change_ticket }}"
          echo "Release window: ${{ inputs.release_window }}"
          echo "Components:      orders-api:1.4.0, payments-api:2.8.1, web-frontend:3.2.0"
          echo "Verifying unit tests, security scans, and approvals..."
          echo "Audit evidence: COMPLETE"

  deploy-staging:
    needs:
      - governance-review
    steps:
      - name: Deploy release to staging
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Deploying FinSure Bank release to STAGING"
          for component in orders-api:1.4.0 payments-api:2.8.1 web-frontend:3.2.0; do
            echo "  -> deploying $component"
          done
          echo "Staging deployment: SUCCESS"

  staging-validation:
    needs:
      - deploy-staging
    steps:
      - name: Run smoke tests and release checks
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Running smoke tests..."
          echo "Checking SLO dashboards..."
          echo "Validating audit controls..."
          echo "Staging validation: PASSED"

  production-approval:
    needs:
      - staging-validation
    steps:
      - name: Production approval (demo talking point)
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "TALKING POINT: add a manual approval gate here in the CloudBees Unify Workflow Composer."
          echo "Suggested approvers: Release Manager, Security, Application Owner"
          echo "Approval: SIMULATED / APPROVED"

  deploy-production:
    needs:
      - production-approval
    steps:
      - name: Deploy release to production
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Deploying FinSure Bank release to PRODUCTION"
          for component in orders-api:1.4.0 payments-api:2.8.1 web-frontend:3.2.0; do
            echo "  -> deploying $component"
          done
          echo "Production deployment: SUCCESS"

  release-evidence:
    needs:
      - deploy-production
    steps:
      - name: Publish release evidence
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== Release evidence package =="
          echo "Unit tests:    passed"
          echo "Security scan: passed"
          echo "Approvals:     complete"
          echo "Deployments:   staging + production"
          echo "Change ticket: ${{ inputs.change_ticket }}"
          echo "Release COMPLETE for FinSure Bank"
