apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: component-deploy

# Simulated component deployment.
# - Called by the application's deployer (workflow_call), or run standalone (workflow_dispatch).
# - Mock/echo only: it SIMULATES a deploy and publishes evidence. It does not
#   deploy to a real cluster.

on:
  workflow_call:
    inputs:
      artifact-id:
        type: string
        required: true
      environment:
        type: string
        required: true
  workflow_dispatch:
    inputs:
      artifact-id:
        type: string
        default: orders-api:1.4.0
      environment:
        type: choice
        options:
          - dev
          - qa
          - staging
          - prod
        default: dev

jobs:
  deploy:
    steps:
      - name: Simulate deployment
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== Simulated component deployment =="
          echo "Component:    orders-api"
          echo "Artifact:     ${{ inputs.artifact-id }}"
          echo "Environment:  ${{ inputs.environment }}"
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "Production policy: approval and change ticket required (talking point)"
          else
            echo "Non-production policy: standard checks passed"
          fi
          echo "Deploy status: SUCCESS (simulated)"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Component deployment (simulated)
            - Component: orders-api
            - Artifact: ${{ inputs.artifact-id }}
            - Environment: ${{ inputs.environment }}
            - Status: **success** (simulated)
